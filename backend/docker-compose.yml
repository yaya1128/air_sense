version: "3.9"

services:
  db:
    image: postgres:16
    container_name: air_sense_db
    environment:
      POSTGRES_DB: air_sense
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d air_sense"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: air_sense_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 与 backend/config.py 中 DATABASE_URL 默认值保持一致
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/air_sense"
      # 从宿主机环境传入 WAQI_TOKEN，没配时使用占位符
      WAQI_TOKEN: "${WAQI_TOKEN:-7030f542870e6d665f6f53ca145614e95e5b09ca}"
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: ["sh", "-c", "python jobs/init_db.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"]

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: air_sense_collector
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/air_sense"
      WAQI_TOKEN: "${WAQI_TOKEN:-7030f542870e6d665f6f53ca145614e95e5b09ca}"
      COLLECT_INTERVAL_SECONDS: "${COLLECT_INTERVAL_SECONDS:-3600}"
    working_dir: /app
    volumes:
      - .:/app
    command: ["python", "jobs/scheduler.py"]

volumes:
  db_data: